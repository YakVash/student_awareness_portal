<!DOCTYPE html>
<html>

<head>
<title>{% block title %}{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar">

<div class="logo">
EDUSCHEME
</div>

<div class="nav-links">

<a href="/">Home</a>

<a href="/schemes">All Schemes</a>

<a href="/check-form">Check Eligibility</a>

<a href="#about">About</a>

<a href="#contact">Contact</a>

</div>

</nav>

{% block content %}
{% endblock %}

<footer class="footer">

<p>EDUSCHEME Portal</p>

<p>
Helping students discover government scholarships and welfare schemes.
</p>

<p>
© 2026 EDUSCHEME | Academic Project
</p>

</footer>

<script>

const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {

const target = +counter.innerText;

let count = 0;

const update = () => {

count += Math.ceil(target / 40);

if(count < target){
counter.innerText = count;
setTimeout(update,30);
}else{
counter.innerText = target;
}

}

update();

});

</script>

</body>

</html>
