{% extends "base.html" %}

{% block title %}Check Eligibility{% endblock %}

{% block content %}

<div class="container">

    <h2>Check Your Eligibility</h2>
    <p class="page-description">Fill in your details below and we'll find matching government schemes for you.</p>

    <form method="POST" action="/check">

        <label for="education">Education Level</label>
        <select name="education" id="education" required>
            <option value="">Select your education level</option>
            <option value="Primary">Primary</option>
            <option value="Secondary">Secondary</option>
            <option value="Higher Secondary">Higher Secondary</option>
            <option value="Diploma">Diploma</option>
            <option value="UG">Undergraduate (UG)</option>
            <option value="PG">Postgraduate (PG)</option>
            <option value="PhD">PhD</option>
        </select>

        <label for="income">Family Income (Annual in ₹)</label>
        <input type="number" name="income" id="income" placeholder="e.g. 250000" required>

        <label for="category">Category</label>
        <select name="category" id="category" required>
            <option value="">Select your category</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="OBC">OBC</option>
            <option value="Any">General / Any</option>
            <option value="Minority">Minority</option>
        </select>

        <label for="gender">Gender</label>
        <select name="gender" id="gender" required>
            <option value="">Select your gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Any">Any</option>
        </select>

        <label for="disability">Disability Status</label>
        <select name="disability" id="disability" required>
            <option value="">Select disability status</option>
            <option value="Yes">PWD (Person with Disability)</option>
            <option value="No">Non-PWD</option>
            <option value="Any">Any</option>
        </select>

        <label for="first_graduate">First Graduate in Family?</label>
        <select name="first_graduate" id="first_graduate" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Any">Any</option>
        </select>

        <label for="age">Age</label>
        <input type="number" name="age" id="age" placeholder="e.g. 20" required>

        <button type="submit">Check Eligibility</button>

    </form>

</div>

{% endblock %}
