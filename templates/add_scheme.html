{% extends "base.html" %}

{% block title %}Add Scheme{% endblock %}

{% block content %}

<div class="container">

    <h2>Add New Scheme</h2>

    <form method="POST" action="/save-scheme">

        <label>Scheme Name</label>
        <input type="text" name="scheme_name" required>

        <label>Education Level</label>
        <select name="education" required>
            <option value="">Select</option>
            <option value="Primary">Primary</option>
            <option value="Secondary">Secondary</option>
            <option value="Higher Secondary">Higher Secondary</option>
            <option value="Diploma">Diploma</option>
            <option value="UG">Undergraduate (UG)</option>
            <option value="PG">Postgraduate (PG)</option>
            <option value="PhD">PhD</option>
        </select>

        <label>Max Income</label>
        <input type="number" name="max_income" required>

        <label>Category</label>
        <select name="category" required>
            <option value="">Select</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="OBC">OBC</option>
            <option value="Minority">Minority</option>
            <option value="Any">Any</option>
        </select>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Any">Any</option>
        </select>

        <label>Disability Applicable</label>
        <select name="disability" required>
            <option value="">Select</option>
            <option value="Yes">Only for PWD</option>
            <option value="No">Not Disability Specific</option>
            <option value="Any">Applicable to All</option>
        </select>

        <label>Frist Graduate Eligibility</label>
        <select name="first_graduate" required>
            <option value="">Select</option>
            <option value="Yes">Required</option>
            <option value="No">Not Required</option>
            <option value="Any">Applicable to All</option>
        </select>
        
        <label>Minimum Age</label>
        <input type="number" name="min_age" required>

        <label>Maximum Age</label>
        <input type="number" name="max_age" required>

        <label>Benefits</label>
        <input type="text" name="benefits" required>

        <label>Documents</label>
        <input type="text" name="documents" required>


        <label>Official Website Link</label>
        <input type="text" name="official_link" required>

        <label>YouTube Tutorial Link</label>
        <input type="text" name="youtube_link" required>

        <button type="submit">Add Scheme</button>

    </form>

</div>

{% endblock %}
